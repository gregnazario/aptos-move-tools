name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  RUST_BACKTRACE: 1

jobs:
  build-lint-test:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tool:
          - tools-base
          - move-suggest
          - move-bounds-checker
          - move1-to-move2
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build ${{ matrix.tool }}
        run: cargo build --manifest-path ${{ matrix.tool }}/Cargo.toml

      - name: Lint ${{ matrix.tool }}
        run: cargo clippy --manifest-path ${{ matrix.tool }}/Cargo.toml -- -D warnings

      - name: Format check ${{ matrix.tool }}
        run: cargo fmt --manifest-path ${{ matrix.tool }}/Cargo.toml -- --check

      - name: Test ${{ matrix.tool }}
        run: cargo test --manifest-path ${{ matrix.tool }}/Cargo.toml
