name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v*-*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build / ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            zigbuild: true
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            zigbuild: true
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            zigbuild: true
            archive: tar.gz
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            zigbuild: true
            archive: tar.gz
          - target: x86_64-apple-darwin
            runner: macos-13
            zigbuild: false
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-14
            zigbuild: false
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            zigbuild: false
            archive: zip

    env:
      CARGO_TARGET_DIR: target-shared

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93"
          targets: ${{ matrix.target }}

      - name: Install Zig
        if: matrix.zigbuild
        uses: mlugg/setup-zig@v1

      - name: Install cargo-zigbuild
        if: matrix.zigbuild
        uses: taiki-e/install-action@cargo-zigbuild

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          workspaces: |
            move-suggest
            move-bounds-checker
            move1-to-move2

      - name: Determine build target
        id: target
        shell: bash
        run: |
          target="${{ matrix.target }}"
          zigbuild="${{ matrix.zigbuild }}"
          if [[ "$zigbuild" == "true" && "$target" == *"-gnu" ]]; then
            echo "build_target=${target}.2.17" >> "$GITHUB_OUTPUT"
          else
            echo "build_target=${target}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build binaries
        shell: bash
        run: |
          build_cmd="cargo build"
          if [[ "${{ matrix.zigbuild }}" == "true" ]]; then
            build_cmd="cargo zigbuild"
          fi

          for crate in move-suggest move-bounds-checker move1-to-move2; do
            echo "::group::Building $crate"
            $build_cmd --release \
              --manifest-path "$crate/Cargo.toml" \
              --target "${{ steps.target.outputs.build_target }}"
            echo "::endgroup::"
          done

      - name: Determine archive name
        id: archive
        shell: bash
        run: |
          version="${GITHUB_REF_NAME:-dev}"
          name="aptos-move-tools-${version}-${{ matrix.target }}"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          staging="${{ steps.archive.outputs.name }}"
          mkdir -p "$staging"

          for bin in move-suggest move-bounds-checker move1-to-move2; do
            cp "target-shared/${{ matrix.target }}/release/$bin" "$staging/"
          done

          tar czf "$staging.tar.gz" "$staging"
          echo "ASSET=$staging.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          staging="${{ steps.archive.outputs.name }}"
          mkdir -p "$staging"

          for bin in move-suggest move-bounds-checker move1-to-move2; do
            cp "target-shared/${{ matrix.target }}/release/$bin.exe" "$staging/"
          done

          7z a "$staging.zip" "$staging"
          echo "ASSET=$staging.zip" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.archive.outputs.name }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz *.zip > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Determine pre-release
        id: prerelease
        run: |
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            echo "flag=true" >> "$GITHUB_OUTPUT"
          else
            echo "flag=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.flag == 'true' }}
